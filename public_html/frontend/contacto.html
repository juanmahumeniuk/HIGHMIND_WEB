<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | HIGHMIND</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700&display=swap" rel="stylesheet">
    <link rel="icon" href="img/logo.jpeg">
    <meta name="description" content="Contáctanos - HIGHMIND">
</head>
<body>
    <header>
        <nav class="navbar">
        <a href="#" class="logo">
            <img src="img/logo.jpeg" alt="HIGHMIND" />
            <span>HIGHMIND</span>
        </a>
        <button type="button" class="menu-toggle" id="menu-toggle" aria-controls="nav-links" aria-expanded="false" aria-label="Abrir menú"></button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="tienda.html">Tienda</a></li>
            <li><a href="contacto.html">Contacto</a></li>
            <li><a href="login.html" id="sesion-btn">Iniciar sesión</a></li>
            <li>
            <a href="#" id="carrito-btn">Carrito
                <span id="carrito-badge"></span>
            </a>
            </li>
        </ul>
        </nav>

    </header>
    <main>
        <section class="contacto-main">
            <h2>Contacto</h2>
            <div class="contacto-grid">
                <!-- Formulario de contacto -->
                <form class="form-contacto" id="form-contacto" autocomplete="off">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required maxlength="40">

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required maxlength="60">

                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" rows="4" required maxlength="800"></textarea>
                    
                    <button type="submit" class="btn btn-primary">Enviar mensaje</button>
                    <div id="contacto-respuesta" class="contacto-respuesta"></div>
                </form>
                <!-- Datos de contacto -->
                <div class="contacto-info">
                    <h3>Otras vías de contacto</h3>
                    <ul>
                        <li><b>Email:</b> <a href="mailto:highmind.contacto@gmail.com">highmind.contacto@gmail.com</a></li>
                        <li><b>WhatsApp:</b> <a href="https://wa.me/549XXXXXXXXX" target="_blank">+54 9 XX XXX XXXX</a></li>
                        <!-- Agrega tu dirección real si quieres -->
                        <!--<li><b>Dirección:</b> Av. Siempreviva 123, Ciudad</li>-->
                    </ul>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 HIGHMIND. Todos los derechos reservados.</p>
    </footer>
        <script src="https://sdk.mercadopago.com/js/v2"></script>
        <script src="js/config.js"></script>
        <script src="js/script.js"></script>
        <script src="js/carrito.js"></script>
        <script src="js/navbar.js"></script>

            <!-- Modal Carrito -->
        <div id="modal-carrito" class="modal" style="display:none;">
          <div class="modal-content-carrito">
            <span class="close-modal" id="cerrar-modal-carrito">&times;</span>
            <h2>Carrito de compras</h2>
            <div id="carrito-items"></div>
            <div class="carrito-footer">
              <div>
                <span class="carrito-label">Subtotal:</span>
                <span id="carrito-subtotal" class="carrito-subtotal"></span>
              </div>
              <p id="checkout-disabled-hint" class="checkout-disabled-hint" style="display:none;" role="status" aria-live="polite"></p>
              <button class="btn btn-primary" id="finalizar-compra">Finalizar compra</button>
              <button class="btn btn-secondary" id="vaciar-carrito">Vaciar carrito</button>
            </div>
            <div id="checkout-panel" class="checkout-panel" style="display:none;">
              <h3>Pago con tarjeta</h3>
              <p id="checkout-payment-notice" class="checkout-payment-notice" style="display:none;" role="status" aria-live="polite"></p>
              <div id="checkout-feedback" class="checkout-feedback"></div>
              <div id="paymentBrick_container"></div>
            </div>
          </div>
        </div>
</body>
</html>
