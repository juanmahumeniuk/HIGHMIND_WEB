<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | HIGHMIND</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="img/logo.jpeg">
</head>
<body>
    <div class="fondo"></div>

    <header>
        <nav class="navbar">
        <a href="#" class="logo">
            <img src="img/logo.jpeg" alt="HIGHMIND" />
            <span>HIGHMIND</span>
        </a>
        <button type="button" class="menu-toggle" id="menu-toggle" aria-controls="nav-links" aria-expanded="false" aria-label="Abrir menú"></button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="tienda.html">Tienda</a></li>
            <li><a href="contacto.html">Contacto</a></li>
            <li id="nav-admin-item" style="display: none;"><a href="../admin/index.html">Panel admin</a></li>
            <li><a href="login.html" id="sesion-btn">Iniciar sesión</a></li>
            <li>
            <a href="#" id="carrito-btn" class="carrito-nav-link" aria-label="Carrito">
                <span class="carrito-nav-icon" aria-hidden="true">
                  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                </span>
                <span id="carrito-badge"></span>
            </a>
            </li>
        </ul>
        </nav>
    </header>
    <main>
        <section class="login-section">
            <div class="login-box">
                <span class="kicker login-kicker">Bienvenido</span>
                <h2>Acceder a tu cuenta</h2>
                <p class="login-subtitle">Ingresá o creá tu cuenta de forma segura.</p>

                <div class="login-oauth">
                    <button type="button" id="firebase-google-btn" class="btn btn-oauth btn-oauth-google">
                        Ingresar con Google
                    </button>
                    <button type="button" id="firebase-github-btn" class="btn btn-oauth btn-oauth-github">
                        Ingresar con GitHub
                    </button>
                </div>

                <p class="login-divider"><span>o con email</span></p>

                <form id="login-form">
                    <label for="login-email">Email</label>
                    <input id="login-email" type="email" autocomplete="username" required>
                    <label for="login-password">Contraseña</label>
                    <input id="login-password" type="password" autocomplete="current-password" required>
                    <button id="login-submit" type="submit" class="btn btn-primary btn-auth0">Ingresar</button>
                </form>

                <form id="register-form" style="display:none;">
                    <label for="register-email">Email</label>
                    <input id="register-email" type="email" autocomplete="username" required>
                    <label for="register-password">Contraseña</label>
                    <input id="register-password" type="password" autocomplete="new-password" minlength="6" required>
                    <button id="register-submit" type="submit" class="btn btn-primary btn-auth0">Crear cuenta</button>
                </form>

                <p class="login-subtitle" style="margin-top:1rem;">
                    <a href="#" id="show-register">¿No tenés cuenta? Registrate</a>
                    <span id="show-login-wrap" style="display:none;">
                        · <a href="#" id="show-login">Ya tengo cuenta</a>
                    </span>
                </p>

                <div id="login-msg" class="login-msg"></div>
            </div>
        </section>
    </main>
    <footer class="site-footer">
        <div class="footer-bottom">
            <p>&copy; 2025 HIGHMIND. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/anim.js" defer></script>
    <script>
      document.getElementById('show-register').addEventListener('click', function () {
        document.getElementById('show-login-wrap').style.display = '';
      });
      document.getElementById('show-login').addEventListener('click', function () {
        document.getElementById('show-login-wrap').style.display = 'none';
      });
    </script>
</body>
</html>
