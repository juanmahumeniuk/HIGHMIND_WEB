<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | HIGHMIND</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700&display=swap" rel="stylesheet">
    <link rel="icon" href="img/logo.jpeg">
</head>
<body>
    <!-- Fondo borroso -->
    <div class="fondo"></div>
    
    <header>
        <nav class="navbar">
        <a href="#" class="logo">
            <img src="img/logo.jpeg" alt="HIGHMIND" />
            <span>HIGHMIND</span>
        </a>
        <button type="button" class="menu-toggle" id="menu-toggle" aria-controls="nav-links" aria-expanded="false" aria-label="Abrir menú"></button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="tienda.html">Tienda</a></li>
            <li><a href="contacto.html">Contacto</a></li>
            <li><a href="login.html" id="sesion-btn">Iniciar sesión</a></li>
            <li>
            <a href="#" id="carrito-btn">Carrito
                <span id="carrito-badge"></span>
            </a>
            </li>
        </ul>
        </nav>
    </header>
    <main>
        <section class="login-section">
            <div class="login-box">
                <h2>Iniciar sesión</h2>
                <form id="login-form" autocomplete="off">
                    <input type="email" id="login-email" required placeholder="Email">
                    <input type="password" id="login-password" required placeholder="Contraseña">
                    <button type="submit" class="btn btn-primary">Ingresar</button>
                </form>
                <div class="login-divider"><span>o</span></div>
                <h2>Crear cuenta</h2>
                <form id="register-form" autocomplete="off">
                    <input type="text" id="reg-nombre" required placeholder="Nombre">
                    <input type="email" id="reg-email" required placeholder="Email">
                    <input type="password" id="reg-password" required placeholder="Contraseña (mínimo 6)">
                    <button type="submit" class="btn btn-primary">Registrarme</button>
                </form>
                <div id="login-msg" class="login-msg"></div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 HIGHMIND. Todos los derechos reservados.</p>
    </footer>
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
    <script src="js/navbar.js"></script>
</body>
</html>
